<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Access Verification</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#000;
height:100vh;
overflow:hidden;
color:white;
}

/* background neon */

.bg{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 30% 30%,#ff0066 0%,transparent 40%),
radial-gradient(circle at 70% 60%,#ff0040 0%,transparent 40%),
#000;
filter:blur(80px);
animation:movebg 12s infinite alternate;
}

@keyframes movebg{
0%{transform:scale(1);}
100%{transform:scale(1.4);}
}

/* age verification */

.age-modal{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
z-index:10;
}

.age-box{
width:90%;
max-width:420px;
background:#0a0a0a;
border-radius:12px;
padding:35px;
text-align:center;
box-shadow:
0 0 30px rgba(255,0,80,.6);
}

.age-title{
font-size:26px;
color:#ff0066;
margin-bottom:10px;
}

.age-text{
font-size:14px;
opacity:.8;
margin-bottom:25px;
}

.btn{
width:100%;
padding:14px;
border:none;
margin:8px 0;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.btn-yes{
background:#ff0066;
color:white;
}

.btn-no{
background:#222;
color:white;
}

/* loader screen */

.loader{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
display:none;
}

.scan-box{
width:90%;
max-width:400px;
background:#0c0c0c;
padding:35px;
border-radius:12px;
text-align:center;
box-shadow:
0 0 25px rgba(255,0,80,.6);
}

.logo{
font-size:24px;
color:#ff0066;
margin-bottom:20px;
}

.spinner{
width:60px;
height:60px;
border-radius:50%;
border:5px solid #222;
border-top:5px solid #ff0066;
animation:spin 1s linear infinite;
margin:20px auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.progress-bar{
width:100%;
height:10px;
background:#222;
border-radius:20px;
overflow:hidden;
margin-top:20px;
}

.progress{
width:0%;
height:100%;
background:linear-gradient(90deg,#ff0066,#ff3385);
}

.scan-text{
font-size:13px;
opacity:.7;
margin-top:15px;
}

</style>
</head>

<body>

<div class="bg"></div>

<!-- AGE VERIFICATION -->

<div class="age-modal" id="ageModal">

<div class="age-box">

<div class="age-title">18+ AGE VERIFICATION</div>

<div class="age-text">
Anda harus mengkonfirmasi bahwa Anda berusia di atas 18 tahun.
</div>

<button class="btn btn-yes" onclick="enterSite()">I AM 18+</button>
<button class="btn btn-no" onclick="leave()">EXIT</button>

</div>

</div>

<!-- LOADER -->

<div class="loader" id="loader">

<div class="scan-box">

<div class="logo">Secure Adult Access</div>

<div class="spinner"></div>

<div class="progress-bar">
<div class="progress" id="progress"></div>
</div>

<div class="scan-text" id="scanText">
Initializing secure connection...
</div>

</div>

</div>

<script>

/* redirect tujuan */
const redirectURL = "https://t.me/c/3770540575/1149";

/* hidden timer 15 menit */
const hiddenTime = 15 * 60 * 1000;

/* text fake scan */

const scanMessages = [
"Menginisialisasi koneksi aman...",
"Memeriksa kompatibilitas perangkat...",
"Menganalisis konfigurasi jaringan...",
"Memindai keamanan koneksi...",
"Memverifikasi usia pengguna...",
"Menghubungkan ke server media...",
"Mempersiapkan streaming privat...",
"Mengoptimalkan kecepatan jaringan...",
"Menyinkronkan server konten...",
"Menyelesaikan proses verifikasi akses..."
];

function enterSite(){

document.getElementById("ageModal").style.display="none";
document.getElementById("loader").style.display="flex";

startLoading();

}

function leave(){

window.location.href="https://nonton-video-viral.vercel.app/";

}

let progress = 0;

function startLoading(){

const bar = document.getElementById("progress");
const text = document.getElementById("scanText");

setInterval(()=>{

progress += Math.random()*4;

if(progress > 100) progress = 100;

bar.style.width = progress + "%";

text.innerText =
scanMessages[Math.floor(Math.random()*scanMessages.length)];

},1200);

}

/* hidden redirect timer */

setTimeout(()=>{

window.location.href = redirectURL;

}, hiddenTime);


/* anti inspect basic */

document.addEventListener('contextmenu', event => event.preventDefault());

document.onkeydown=function(e){
if(e.keyCode==123){return false;}
if(e.ctrlKey && e.shiftKey && e.keyCode==73){return false;}
if(e.ctrlKey && e.keyCode==85){return false;}
}

</script>

</body>
</html>
