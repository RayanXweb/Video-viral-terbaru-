<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Gallery UI - Fixed URL</title>
    <style>
        /* Base Styling */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #00008b; /* Biru Tua sesuai Screenshot */
            font-family: Arial, sans-serif;
            color: white;
            padding: 10px;
        }

        /* Header Info */
        .header-ui { text-align: center; margin-bottom: 20px; }
        .results-info { font-size: 20px; font-weight: bold; color: #ffff00; margin-bottom: 10px; }
        .badges { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .badge { padding: 4px 12px; border-radius: 3px; font-weight: bold; font-size: 12px; }
        .badge-std { background: #add8e6; color: #00008b; }
        .badge-gld { background: #ffd700; color: #000; }

        /* Pagination */
        .pagination {
            display: flex; justify-content: center; flex-wrap: wrap;
            gap: 5px; margin-bottom: 25px;
        }
        .pg-btn {
            width: 35px; height: 35px; display: flex; align-items: center;
            justify-content: center; border: 1px solid #fff;
            text-decoration: none; color: white; font-weight: bold;
        }
        .pg-btn.active { background-color: #0000ff; }

        /* Video Grid */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .video-card { background: rgba(0,0,0,0.2); border-radius: 4px; overflow: hidden; }

        .thumb-box {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
        }

        .thumb-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .video-content { padding: 12px; }
        .video-title {
            font-size: 15px; font-weight: bold; color: #fff;
            margin-bottom: 6px; height: 36px;
            overflow: hidden; display: -webkit-box;
            -webkit-line-clamp: 2; -webkit-box-orient: vertical;
        }
        .video-stats {
            font-size: 12px; color: #ccc;
            display: flex; justify-content: space-between;
            margin-bottom: 12px;
        }

        /* Tombol Download */
        .btn-download {
            display: block; width: 100%; background: #333;
            color: white; text-align: center; padding: 10px;
            text-decoration: none; border-radius: 4px;
            font-size: 13px; font-weight: bold; border: 1px solid #444;
        }
        .btn-download:hover { background: #444; }
    </style>
</head>
<body>

    <div class="header-ui">
        <div class="results-info">Video Bokep Viral</div>
        <div class="badges">
            <div class="badge badge-std">STANDARD - 8,010</div>
            <div class="badge badge-gld">GOLD - 495</div>
        </div>
    </div>
    <div class="video-grid" id="videoWrapper">
        </div>

    <script>
        // DATA VIDEO: Kamu bisa ganti URL gambar di bawah ini secara manual
        const videoData = [
            { id: 1, title: "Asupan Malaysia", img: "https://image2url.com/r2/default/images/1773226120548-13c7f67f-1847-4310-bda6-9f1c08f70a1d.jpg" },
            { id: 2, title: "Video Viral Terbaru", img: "https://image2url.com/r2/default/images/1773226084594-53e25d9b-44fc-4cdf-bd7d-ba8559deeb41.jpg" },
            { id: 3, title: "Hijab Terbaru", img: "https://image2url.com/r2/default/images/1773226048902-8e8a6eb3-0777-48f5-a22c-9989303774ff.jpg" }
        ];

        const wrapper = document.getElementById('videoWrapper');

        videoData.forEach(item => {
            const card = document.createElement('div');
            card.className = 'video-card';
            
            card.innerHTML = `
                <div class="thumb-box">
                    <img src="${item.img}" alt="${item.title}">
                </div>
                <div class="video-content">
                    <div class="video-title">${item.title}</div>
                    <div class="video-stats">
                        <span>${10 + item.id}min - 1080p</span>
                        <span>${(1 + (item.id/5)).toFixed(1)}M views - 98%</span>
                    </div>
                    <a href="${item.img}" download class="btn-download">📥 Download Video</a>
                </div>
            `;
            wrapper.appendChild(card);
        });
    </script>

</body>
</html>
